name: Generate Premium Media

on:
  workflow_dispatch:
    inputs:
      content_type:
        description: 'Type of content to generate'
        required: true
        default: 'liturgy_teaching'
        type: choice
        options:
          - liturgy_teaching
          - daily_verse
      anaphora_type:
        description: 'Which Anaphora to teach (for liturgy_teaching only)'
        required: false
        default: 'hawaryat'
        type: choice
        options:
          - hawaryat
          - hawaryat_test

jobs:
  generate-media:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ github.event.inputs.content_type == 'daily_verse' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install System Dependencies (Linux)
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm1 libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libpango-1.0-0 libcairo2 libasound2t64

      - name: Setup Chrome (System Level)
        id: setup-chrome
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        run: npm install

      - name: Run Liturgy Pipeline
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          PUPPETEER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          node src/index.js --type=liturgy_teaching --anaphora=${{ github.event.inputs.anaphora_type }}

      - name: Run Verse Pipeline
        if: ${{ github.event.inputs.content_type == 'daily_verse' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: |
          pip install requests
          python send_verse.py

      - name: Commit Teaching Progress
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        run: |
          git config --global user.name "EOTC Media Bot"
          git config --global user.email "bot@eotc-media.studio"
          git add src/data/state.json
          git diff --cached --quiet || git commit -m "📖 Auto: Update teaching progress [skip ci]"
          git push

      - name: Upload Output Artifacts
        if: ${{ github.event.inputs.content_type == 'liturgy_teaching' }}
        uses: actions/upload-artifact@v4
        with:
          name: liturgy-premium-cards
          path: output/*.png
          if-no-files-found: ignore
