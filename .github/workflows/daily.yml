name: Daily Spiritual Drip

on:
  schedule:
    - cron: '30 3 * * *' # በኢትዮጵያ 6:30 AM (ጠዋት 12:30) ላይ እንዲነሳ ያደርገዋል
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # GitHub Action ፋይል እንዲጽፍና Push እንዲያደርግ ፍቃድ መስጠት
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ታሪኩን በሙሉ እንዲያነበው

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Spiritual Drip Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python send_verse.py

      - name: Save and Commit Theme State
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # ፋይሉ ከሌለ ባዶ እንዲፈጥረው (ለመጀመሪያ ጊዜ ብቻ)
          if [ ! -f theme_state.json ]; then echo "{}" > theme_state.json; fi
          git add theme_state.json
          git commit -m "Update theme state [skip ci]" || echo "No changes to commit"
          git push
