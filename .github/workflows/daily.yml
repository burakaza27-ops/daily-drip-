name: Daily Spiritual Drip

on:
  schedule:
    # Runs daily at 5:00 AM UTC (8:00 AM Ethiopia Time)
    - cron: '0 5 * * *' 
  workflow_dispatch:

# Prevents multiple runs from happening at the exact same time
concurrency:
  group: spiritual-drip-group
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Failsafe: Automatically kills the script if it takes longer than 10 minutes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Caches dependencies to make the run faster and more reliable

      - name: Install dependencies
        run: pip install google-generativeai requests

      - name: Run Spiritual Drip Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python send_verse.py
