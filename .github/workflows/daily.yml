name: Daily Spiritual Drip

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # ወደ 3.11 ከፍ ተደርጓል

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai requests # አዲሱ የ 2026 ላይብረሪ

      - name: Run Spiritual Drip Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python send_verse.py
