<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidase Liturgy Teaching</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');
        
        @font-face {
            font-family: 'Nyala'; /* Classic EOTC Ethiopic Font */
            /* Assuming system fallback if Nyala isn't available in puppeteer seamlessly, 
               but we rely on standard Abyssinica SIL or sans-serif */
            src: local('Nyala'), local('Abyssinica SIL');
        }

        :root {
            --gold: #C5A059;
            --gold-light: #E8D09E;
            --dark-velvet: #2A0800;
            --midnight-blue: #0A1128;
            --glass-bg: rgba(10, 17, 40, 0.65);
            --glass-border: rgba(197, 160, 89, 0.4);
            --text-primary: #F8F5F0;
            --text-secondary: #D4C5B0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 1080px;
            height: 1350px; /* Standard portrait resolution */
            background: linear-gradient(135deg, var(--midnight-blue) 0%, #151012 50%, var(--dark-velvet) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            position: relative;
        }

        /* Ambient glow effects behind the glass */
        .ambient-glow-1 {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(197,160,89,0.15) 0%, transparent 70%);
            filter: blur(60px);
            z-index: 0;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: -10%;
            right: 10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(42,8,0,0.8) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }

        /* Main Container */
        .glass-pane {
            width: 900px;
            height: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 60px 70px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 40px rgba(197,160,89,0.05);
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: center;
            margin-bottom: 50px;
        }

        .role-badge {
            background: linear-gradient(90deg, rgba(197,160,89,0.1) 0%, rgba(197,160,89,0.2) 50%, rgba(197,160,89,0.1) 100%);
            border: 1px solid var(--glass-border);
            padding: 10px 30px;
            border-radius: 50px;
            color: var(--gold-light);
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Content Area */
        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
        }

        .geez-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .geez-text {
            font-family: 'Nyala', 'Inter', serif;
            font-size: 3.2rem;
            line-height: 1.5;
            color: var(--gold);
            text-shadow: 0 4px 20px rgba(197,160,89,0.3);
            margin-bottom: 15px;
        }

        .translation-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 40px;
        }

        .trans-block {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .lang-label {
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
            font-weight: 600;
        }

        .trans-text {
            font-size: 1.35rem;
            line-height: 1.7;
            color: var(--text-primary);
            font-weight: 300;
        }

        /* Insight Section */
        .insight-section {
            background: linear-gradient(135deg, rgba(197,160,89,0.08) 0%, rgba(197,160,89,0.02) 100%);
            border-left: 4px solid var(--gold);
            padding: 35px 40px;
            border-radius: 0 16px 16px 0;
            margin-top: auto;
        }

        .insight-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 15px;
            font-style: italic;
        }

        .insight-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-secondary);
            font-weight: 300;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .footer::before, .footer::after {
            content: '';
            height: 1px;
            width: 50px;
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="glass-pane">
        <!-- Badge -->
        <div class="header">
            <div class="role-badge">
                {{role}}
            </div>
        </div>

        <!-- Liturgy Core -->
        <div class="content">
            <div class="geez-section">
                <div class="geez-text">"{{geez_text}}"</div>
            </div>

            <div class="translation-grid">
                <div class="trans-block">
                    <span class="lang-label">Amharic</span>
                    <p class="trans-text">{{amharic_text}}</p>
                </div>
                <div class="trans-block">
                    <span class="lang-label">English</span>
                    <p class="trans-text">{{english_text}}</p>
                </div>
            </div>
        </div>

        <!-- AI Insight -->
        <div class="insight-section">
            <div class="insight-label">
                <span>✨</span> Spiritual Insight
            </div>
            <div class="insight-text">
                {{spiritual_insight}}
            </div>
        </div>

        <div class="footer">
            EOTC Media Studio • Qidasie Hawaryat
        </div>
    </div>
</body>
</html>
