<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidase Liturgy Teaching</title>
    <link href="https://fonts.googleapis.com/css2?family=Abyssinica+SIL&family=Noto+Sans+Ethiopic:wght@400;500;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --gold-bright: #E8D09E;
            --gold-dim: rgba(197, 160, 89, 0.15);
            --imperial-red: #8B0000;
            --midnight: #06090F;
            --charcoal-deep: #0C0F18;
            --glass-bg: rgba(12, 15, 24, 0.72);
            --glass-border: rgba(197, 160, 89, 0.22);
            --ivory: #FAF7F2;
            --silver: #B8AFA3;
            --muted: #7A7268;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 1080px;
            height: 1350px;
            background-color: var(--midnight);
            background-image:
                radial-gradient(ellipse at 15% 10%, rgba(139, 0, 0, 0.18) 0px, transparent 55%),
                radial-gradient(ellipse at 85% 90%, rgba(197, 160, 89, 0.1) 0px, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(6, 9, 15, 0.95) 0px, transparent 100%),
                linear-gradient(180deg, var(--midnight) 0%, var(--charcoal-deep) 100%);
            font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle sacred texture */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Decorative cross watermark */
        body::after {
            content: "✝";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 600px;
            color: rgba(197, 160, 89, 0.015);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            width: 920px;
            min-height: 1150px;
            background: var(--glass-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--glass-border);
            border-radius: 44px;
            padding: 65px 75px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            box-shadow:
                0 60px 120px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(197, 160, 89, 0.08),
                inset 0 0 80px rgba(197, 160, 89, 0.015);
        }

        /* Gold corner filigree accents */
        .card::before, .card::after {
            content: "";
            position: absolute;
            width: 60px;
            height: 60px;
            opacity: 0.25;
        }
        .card::before {
            top: 22px; left: 22px;
            border-top: 2px solid var(--gold);
            border-left: 2px solid var(--gold);
            border-radius: 12px 0 0 0;
        }
        .card::after {
            bottom: 22px; right: 22px;
            border-bottom: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
            border-radius: 0 0 12px 0;
        }

        /* ---- HEADER ---- */
        .header {
            text-align: center;
            margin-bottom: 45px;
            position: relative;
        }

        .step-tracker {
            display: inline-block;
            background: rgba(139, 0, 0, 0.2);
            border: 1px solid rgba(139, 0, 0, 0.4);
            color: #D4A0A0;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            padding: 6px 22px;
            border-radius: 30px;
            margin-bottom: 18px;
        }

        .liturgy-title {
            font-family: 'Abyssinica SIL', serif;
            font-size: 1.7rem;
            color: var(--gold);
            line-height: 1.4;
        }

        .header-divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 20px auto 0;
            opacity: 0.4;
        }

        /* ---- DIALOGUE FLOW ---- */
        .dialogue-flow {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 55px;
        }

        .speaker-block {
            position: relative;
            padding-left: 28px;
        }

        .speaker-block::before {
            content: "";
            position: absolute;
            left: 0;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 3px;
        }

        .priest-block::before {
            background: linear-gradient(180deg, var(--gold), rgba(197, 160, 89, 0.3));
        }

        .people-block::before {
            background: linear-gradient(180deg, rgba(197, 160, 89, 0.5), rgba(197, 160, 89, 0.15));
        }

        .speaker-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .speaker-icon {
            width: 28px;
            height: 28px;
            fill: var(--gold);
            opacity: 0.85;
            flex-shrink: 0;
        }

        .speaker-label {
            font-size: 0.95rem;
            color: var(--gold-bright);
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        .geez {
            font-family: 'Abyssinica SIL', serif;
            font-size: 2.6rem;
            line-height: 1.35;
            color: var(--ivory);
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 20px rgba(197, 160, 89, 0.12);
        }

        .amharic {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            font-size: 1.45rem;
            line-height: 1.65;
            color: var(--silver);
            font-weight: 400;
            padding-left: 6px;
            border-left: 2px solid rgba(197, 160, 89, 0.12);
            margin-left: 2px;
        }

        /* ---- INSIGHT BOX ---- */
        .insight-box {
            margin-top: auto;
            background: linear-gradient(135deg, rgba(197, 160, 89, 0.04) 0%, rgba(139, 0, 0, 0.03) 100%);
            border: 1px solid rgba(197, 160, 89, 0.12);
            padding: 32px 38px;
            border-radius: 22px;
            position: relative;
        }

        .insight-box::before {
            content: "ምስጢር";
            position: absolute;
            bottom: 10px;
            right: 25px;
            font-family: 'Abyssinica SIL', serif;
            font-size: 3.5rem;
            color: var(--gold);
            opacity: 0.03;
            font-weight: 700;
            pointer-events: none;
        }

        .insight-header {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .insight-text {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            font-size: 1.2rem;
            line-height: 1.85;
            color: var(--ivory);
            font-weight: 400;
        }

        /* ---- FOOTER ---- */
        .footer {
            margin-top: 35px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.78rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 4px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="step-tracker">PART {{step_current}} OF {{step_total}}</div>
            <div class="liturgy-title">{{liturgy_part}}</div>
            <div class="header-divider"></div>
        </div>

        <div class="dialogue-flow">
            <!-- Priest -->
            <div class="speaker-block priest-block">
                <div class="speaker-header">
                    <svg class="speaker-icon" viewBox="0 0 24 24"><path d="M11 2h2v5h5v2h-5v5h5v2h-5v6h-2v-6H6v-2h5v-5H6V7h5V2z"/></svg>
                    <span class="speaker-label">ካህን — Priest</span>
                </div>
                <div class="geez">{{priest_geez}}</div>
                <div class="amharic">{{priest_amharic}}</div>
            </div>

            <!-- People -->
            <div class="speaker-block people-block">
                <div class="speaker-header">
                    <svg class="speaker-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <span class="speaker-label">ሕዝብ — People</span>
                </div>
                <div class="geez">{{people_geez}}</div>
                <div class="amharic">{{people_amharic}}</div>
            </div>
        </div>

        <!-- Insight -->
        <div class="insight-box">
            <div class="insight-header">✦ መንፈሳዊ ትምህርት</div>
            <div class="insight-text">{{teaching_insight}}</div>
        </div>

        <div class="footer">EOTC Media Studio • ቅዳሴ ሐዋርያት</div>
    </div>
</body>
</html>
