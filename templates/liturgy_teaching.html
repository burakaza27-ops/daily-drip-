<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidase Liturgy Teaching</title>
    <!-- CRITICAL FIX: Ethiopic Font Support -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C5A059;
            --gold-light: #E8D09E;
            --dark-velvet: #1C0500;
            --midnight-blue: #080D1A;
            --glass-bg: rgba(8, 13, 26, 0.75);
            --glass-border: rgba(197, 160, 89, 0.3);
            --text-priest: #F8F5F0;
            --text-people: #E0D8C8;
            --amharic-subtext: #A99E8F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 
         * GLOBALLY APPLY ETHIOPIC FONT TO ENSURE NO GLYPH ERRORS 
         */
        body {
            width: 1080px;
            height: 1350px;
            background: linear-gradient(145deg, var(--midnight-blue) 0%, #110B10 50%, var(--dark-velvet) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;
            color: var(--text-priest);
            overflow: hidden;
            position: relative;
        }

        .ambient-glow-1 {
            position: absolute;
            top: 5%;
            left: 5%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(197,160,89,0.12) 0%, transparent 65%);
            filter: blur(60px);
            z-index: 0;
        }

        .ambient-glow-2 {
            position: absolute;
            bottom: -5%;
            right: 0%;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(28,5,0,0.9) 0%, transparent 70%);
            filter: blur(80px);
            z-index: 0;
        }

        .glass-pane {
            width: 920px;
            height: 1150px;
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 36px;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 0 50px rgba(197,160,89,0.03);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(197,160,89,0.2);
        }

        .part-name {
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 50px; 
        }

        /* Dialogue Box Styles */
        .dialogue-block {
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            padding-left: 20px;
        }

        .dialogue-block::before {
            content: '';
            position: absolute;
            left: 0;
            top: 5px;
            bottom: 5px;
            width: 3px;
            background: var(--gold);
            border-radius: 5px;
            opacity: 0.6;
        }

        .people-block::before {
            background: rgba(197,160,89,0.3); /* Softer line for people's response */
        }

        .role-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(197,160,89,0.1);
            border: 1px solid rgba(197,160,89,0.4);
            padding: 6px 18px;
            border-radius: 30px;
            color: var(--gold-light);
            font-size: 1rem;
            font-weight: 700;
            align-self: flex-start;
            margin-bottom: 5px;
        }

        .geez-text {
            font-size: 2.8rem;
            line-height: 1.4;
            color: var(--gold-light);
            font-weight: 700;
            text-shadow: 0 2px 15px rgba(197,160,89,0.2);
        }

        .amharic-text {
            font-size: 1.6rem;
            line-height: 1.6;
            color: var(--amharic-subtext);
            font-weight: 400;
        }

        /* Teaching Insight Section */
        .insight-section {
            background: linear-gradient(135deg, rgba(197,160,89,0.05) 0%, transparent 100%);
            border-top: 2px solid rgba(197,160,89,0.2);
            border-bottom: 2px solid rgba(197,160,89,0.2);
            padding: 30px 40px;
            margin-top: auto;
            border-radius: 8px;
            position: relative;
        }

        .insight-label {
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
            color: var(--gold);
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .insight-text {
            /* If the insight is Amharic, it uses Ethiopic; if English, it uses Inter */
            font-size: 1.3rem;
            line-height: 1.7;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .footer {
            margin-top: 35px;
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <div class="glass-pane">
        
        <div class="header">
            <div class="part-name">{{liturgy_part}}</div>
        </div>

        <div class="content">
            <!-- Priest Dialogue -->
            <div class="dialogue-block">
                <div class="role-badge">ካህን (Priest)</div>
                <div class="geez-text">{{priest_geez}}</div>
                <div class="amharic-text">{{priest_amharic}}</div>
            </div>

            <!-- People Dialogue -->
            <div class="dialogue-block people-block">
                <div class="role-badge">ሕዝብ (People)</div>
                <div class="geez-text">{{people_geez}}</div>
                <div class="amharic-text">{{people_amharic}}</div>
            </div>
        </div>

        <!-- AI Spiritual Insight -->
        <div class="insight-section">
            <div class="insight-label">✨ Teaching Insight</div>
            <div class="insight-text">
                {{teaching_insight}}
            </div>
        </div>

        <div class="footer">
            EOTC MEDIA STUDIO • QIDASIE HAWARYAT
        </div>
    </div>
</body>
</html>
