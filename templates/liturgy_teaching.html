<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidase Liturgy Teaching</title>
    <link href="https://fonts.googleapis.com/css2?family=Abyssinica+SIL&family=Noto+Sans+Ethiopic:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Premium Core Palette */
            --gold: #D4AF37;
            --gold-bright: #F9E596;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --imperial-red: #A31D1D;
            --emerald: #14B866;
            --silver: #C0C5CE;
            --ivory: #FDFBF7;
            
            /* Modern UI Tokens */
            --glass-bg: rgba(15, 17, 24, 0.72);
            --glass-border: rgba(212, 175, 55, 0.35);
            --midnight: #050510;
            --muted-text: #A0A0A0;
            --glow-red: rgba(74, 4, 4, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            width: 1080px;
            height: 1350px;
            background-color: var(--midnight);
            background-image:
                radial-gradient(circle at 50% 50%, var(--glow-red) 0%, transparent 70%),
                radial-gradient(circle at 20% 10%, rgba(212, 175, 55, 0.1) 0%, transparent 40%),
                linear-gradient(180deg, rgba(5, 5, 16, 0.95) 0%, #000 100%);
            font-family: 'Noto Sans Ethiopic', 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Atmospheric depth overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 45%, rgba(74, 4, 4, 0.3) 0%, transparent 65%);
            pointer-events: none;
            z-index: 1;
        }

        .card {
            width: 940px;
            min-height: 1080px;
            max-height: 1280px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 75px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .header { text-align: center; margin-bottom: 30px; flex-shrink: 0; }
        
        .step-tracker {
            display: inline-flex;
            align-items: center;
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--gold-bright);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 4px;
            padding: 10px 30px;
            border-radius: 50px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .liturgy-title {
            font-family: 'Abyssinica SIL', serif;
            font-size: 1.85rem;
            color: var(--gold);
            line-height: 1.4;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            font-weight: 400;
        }

        .dialogue-flow {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 28px;
            overflow: visible;
        }

        .speaker-block {
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 24px 35px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .speaker-block::before {
            content: "";
            position: absolute;
            left: 20px;
            top: 24px;
            bottom: 24px;
            width: 3px;
            border-radius: 10px;
        }

        .deacon-block::before { background: var(--imperial-red); box-shadow: 0 0 15px var(--imperial-red); }
        .priest-block::before { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .asst_priest-block::before { background: var(--emerald); box-shadow: 0 0 15px var(--emerald); }
        .people-block::before { background: var(--silver); box-shadow: 0 0 15px var(--silver); }

        .speaker-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            margin-left: 10px;
        }

        .speaker-label {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }

        .geez {
            font-family: 'Abyssinica SIL', serif;
            font-size: 2.15rem;
            line-height: 1.4;
            color: var(--ivory);
            font-weight: 700;
            margin-left: 10px;
            white-space: pre-line;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .amharic {
            font-family: 'Noto Sans Ethiopic', sans-serif;
            font-size: 1.25rem;
            line-height: 1.6;
            color: var(--silver);
            margin-top: 10px;
            margin-left: 10px;
            white-space: pre-line;
            opacity: 0.85;
            border-left: 2px solid rgba(212, 175, 55, 0.25);
            padding-left: 15px;
        }

        .insight-box {
            margin-top: 30px;
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 24px 40px;
            border-radius: 20px;
            flex-shrink: 0;
            position: relative;
        }
        
        .insight-header {
            font-size: 0.8rem;
            color: var(--gold-bright);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .insight-text {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--ivory);
            font-weight: 300;
            font-family: 'Noto Sans Ethiopic', sans-serif;
        }

        .footer {
            margin-top: 35px;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 6px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        /* Responsive scaling */
        .dialogue-flow.many-entries .geez { font-size: 1.8rem; }
        .dialogue-flow.many-entries .amharic { font-size: 1.1rem; }
        .dialogue-flow.very-many-entries .geez { font-size: 1.5rem; }
        .dialogue-flow.very-many-entries .amharic { font-size: 1.0rem; }

    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="step-tracker">PART {{step_current}} OF {{step_total}}</div>
            <div class="liturgy-title">{{liturgy_part}}</div>
        </div>

        <div class="dialogue-flow" id="dialogue-flow">
            <!-- Dynamic Dialogue Injection -->
            {{dialogue_html}}
        </div>

        <div class="insight-box">
            <div class="insight-header">መንፈሳዊ ትምህርት</div>
            <div class="insight-text" id="insight-text">{{teaching_insight}}</div>
        </div>

        <div class="footer">EOTC Media Studio • ቅዳሴ ሐዋርያት</div>
    </div>
</body>
</html>
